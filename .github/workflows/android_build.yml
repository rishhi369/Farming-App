name: Android CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Release Optimized APK
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Decode Secrets
      run: |
        if [ -z "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" ]; then
          echo "ERROR: GOOGLE_SERVICES_JSON_BASE64 is missing! Please add it to GitHub Secrets."
          exit 1
        fi
        if [ -z "${{ secrets.SECRETS_PROPERTIES }}" ]; then
          echo "ERROR: SECRETS_PROPERTIES is missing! Please add it to GitHub Secrets."
          exit 1
        fi
        echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > app/google-services.json
        echo "${{ secrets.SECRETS_PROPERTIES }}" > secrets.properties

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: AgriIndia-Release-APK
        path: app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/release/app-release-unsigned.apk
        name: Release ${{ github.ref_name }}
        body: |
          ### 🚀 AgriIndia Production Release
          - Optimized for production
          - Code shrunk and obfuscated (R8)
          - Dependencies cleaned
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
