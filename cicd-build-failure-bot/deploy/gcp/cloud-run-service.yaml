apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: cicd-failure-bot
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "3"
    spec:
      containerConcurrency: 40
      timeoutSeconds: 30
      containers:
        - image: gcr.io/PROJECT_ID/cicd-failure-bot:latest
          ports:
            - containerPort: 8080
          env:
            - name: MODEL_PATH
              value: /app/artifacts/model.joblib
            - name: BOT_DRY_RUN
              value: "false"
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
