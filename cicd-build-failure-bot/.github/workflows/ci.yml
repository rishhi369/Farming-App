name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Unit tests
        run: python -m pytest -q
      - name: Smoke train without Optuna trials
        run: |
          python training/generate_sample_data.py --rows 800 --output data/sample_builds.csv
          python training/train.py --data data/sample_builds.csv --trials 0 --output artifacts/model.joblib
