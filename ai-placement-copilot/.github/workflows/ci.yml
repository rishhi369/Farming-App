name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-placement-copilot
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @placement-copilot/web typecheck
      - run: pnpm --filter @placement-copilot/web lint
      - run: pnpm --filter @placement-copilot/web build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-placement-copilot/services/api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: placement_copilot_test
          POSTGRES_USER: placement
          POSTGRES_PASSWORD: placement
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql+asyncpg://placement:placement@localhost:5432/placement_copilot_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-secret
      ENABLE_REAL_LLM: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: ruff check app tests
      - run: pytest

