services:
  - type: web
    name: placement-copilot-api
    runtime: docker
    rootDir: services/api
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: placement-copilot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: placement-copilot-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
  - type: worker
    name: placement-copilot-worker
    runtime: docker
    rootDir: services/api
    dockerCommand: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO
  - type: redis
    name: placement-copilot-redis
    plan: starter
    ipAllowList: []
databases:
  - name: placement-copilot-db
    databaseName: placement_copilot
    user: placement
    plan: starter

