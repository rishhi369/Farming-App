AWSTemplateFormatVersion: "2010-09-09"
Description: AI Placement Copilot API on AWS App Runner.
Parameters:
  ApiImageUri:
    Type: String
  DatabaseUrl:
    Type: String
    NoEcho: true
  RedisUrl:
    Type: String
    NoEcho: true
  JwtSecretKey:
    Type: String
    NoEcho: true
Resources:
  ApiService:
    Type: AWS::AppRunner::Service
    Properties:
      ServiceName: placement-copilot-api
      SourceConfiguration:
        AutoDeploymentsEnabled: true
        ImageRepository:
          ImageIdentifier: !Ref ApiImageUri
          ImageRepositoryType: ECR
          ImageConfiguration:
            Port: "8000"
            RuntimeEnvironmentVariables:
              APP_ENV: production
              DATABASE_URL: !Ref DatabaseUrl
              REDIS_URL: !Ref RedisUrl
              JWT_SECRET_KEY: !Ref JwtSecretKey
      InstanceConfiguration:
        Cpu: "1 vCPU"
        Memory: "2 GB"
      HealthCheckConfiguration:
        Protocol: HTTP
        Path: /health
Outputs:
  ApiUrl:
    Value: !GetAtt ApiService.ServiceUrl

